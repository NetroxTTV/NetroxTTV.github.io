<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 — Apprendre le coréen</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3354;
  --accent: #ff4b6e;
  --accent2: #7c6af7;
  --green: #34d47a;
  --yellow: #ffd447;
  --blue: #4b9eff;
  --text: #f0f2ff;
  --muted: #7b82a8;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ── TOP BAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.logo { font-size: 1.3rem; font-weight: 900; letter-spacing: -1px; }
.logo span { color: var(--accent); }
.topbar-stats { display: flex; gap: 16px; align-items: center; }
.stat-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface2); border-radius: 20px;
  padding: 5px 12px; font-size: 0.85rem; font-weight: 700;
}

/* ── HOME ── */
.home-content { padding: 24px 20px; flex: 1; }
.welcome { margin-bottom: 28px; }
.welcome h1 { font-size: 1.8rem; font-weight: 900; line-height: 1.2; }
.welcome h1 em { color: var(--accent); font-style: normal; }
.welcome p { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

.progress-card {
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border-radius: var(--radius); padding: 20px; margin-bottom: 28px;
  position: relative; overflow: hidden;
}
.progress-card::before {
  content: '한국어';
  position: absolute; right: -10px; top: -10px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 5rem; font-weight: 900; opacity: 0.1; line-height: 1;
}
.progress-card h3 { font-size: 0.85rem; opacity: 0.85; margin-bottom: 4px; }
.progress-card .xp-num { font-size: 2rem; font-weight: 900; }
.xp-bar-wrap { background: rgba(0,0,0,0.3); border-radius: 99px; height: 8px; margin-top: 10px; }
.xp-bar { background: white; border-radius: 99px; height: 8px; transition: width 0.5s ease; }

.section-label {
  font-size: 0.75rem; font-weight: 800; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
}
.lessons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
.lesson-card {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 18px 16px;
  cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
}
.lesson-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.lesson-card.locked { opacity: 0.4; cursor: not-allowed; }
.lesson-card .lesson-icon { font-size: 2rem; margin-bottom: 8px; }
.lesson-card .lesson-name { font-size: 0.9rem; font-weight: 800; }
.lesson-card .lesson-count { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
.lesson-card .lesson-progress {
  position: absolute; bottom: 0; left: 0;
  height: 3px; background: var(--green); border-radius: 0 0 0 var(--radius);
  transition: width 0.5s;
}
.lesson-card .stars { font-size: 0.75rem; margin-top: 8px; }

/* ── LESSON SCREEN ── */
.lesson-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px; background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.back-btn {
  background: var(--surface2); border: none; color: var(--text);
  width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
  font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
}
.back-btn:hover { background: var(--border); }
.lesson-title { font-weight: 800; font-size: 1.1rem; flex: 1; }
.lesson-progress-bar {
  flex: 1; background: var(--border); border-radius: 99px; height: 8px;
}
.lesson-progress-fill {
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  height: 8px; border-radius: 99px; transition: width 0.4s ease;
}

.lesson-body { flex: 1; padding: 24px 20px; display: flex; flex-direction: column; }
.exercise-type {
  font-size: 0.75rem; font-weight: 800; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
}
.exercise-prompt { font-size: 1.5rem; font-weight: 900; margin-bottom: 6px; line-height: 1.3; }
.exercise-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

/* FLASHCARD */
.flashcard-wrap {
  perspective: 1000px; flex: 1; display: flex;
  align-items: center; justify-content: center; margin-bottom: 24px;
}
.flashcard {
  width: 100%; max-width: 360px; height: 220px;
  position: relative; cursor: pointer;
  transform-style: preserve-3d; transition: transform 0.5s;
}
.flashcard.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0; backface-visibility: hidden;
  background: var(--surface); border: 2px solid var(--border);
  border-radius: 20px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px;
  text-align: center;
}
.card-back { transform: rotateY(180deg); background: var(--surface2); border-color: var(--accent2); }
.card-korean { font-family: 'Noto Sans KR', sans-serif; font-size: 2.5rem; font-weight: 900; color: var(--text); }
.card-roman { font-size: 1rem; color: var(--accent2); margin-top: 6px; }
.card-french { font-size: 1.4rem; font-weight: 800; color: var(--green); }
.card-example { font-size: 0.82rem; color: var(--muted); margin-top: 10px; font-style: italic; }
.card-hint { font-size: 0.75rem; color: var(--muted); position: absolute; bottom: 14px; }

/* QCM OPTIONS */
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.opt {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: 14px; padding: 16px 12px; cursor: pointer;
  font-size: 1rem; font-weight: 700; color: var(--text);
  transition: all 0.15s; text-align: center; line-height: 1.3;
}
.opt:hover:not(:disabled) { border-color: var(--accent2); background: var(--surface2); }
.opt.correct { border-color: var(--green); background: rgba(52,212,122,0.15); color: var(--green); }
.opt.wrong { border-color: var(--accent); background: rgba(255,75,110,0.15); color: var(--accent); }
.opt.reveal { border-color: var(--green); background: rgba(52,212,122,0.1); }

/* INPUT */
.input-wrap { display: flex; gap: 10px; margin-bottom: 20px; }
.answer-input {
  flex: 1; background: var(--surface); border: 2px solid var(--border);
  border-radius: 14px; padding: 16px; font-size: 1.1rem; font-weight: 700;
  color: var(--text); outline: none; font-family: 'Nunito', sans-serif;
}
.answer-input:focus { border-color: var(--accent2); }
.answer-input.correct { border-color: var(--green); background: rgba(52,212,122,0.1); }
.answer-input.wrong { border-color: var(--accent); background: rgba(255,75,110,0.1); }
.submit-btn {
  background: var(--accent2); border: none; border-radius: 14px;
  padding: 0 20px; color: white; font-size: 1.2rem; cursor: pointer;
}
.submit-btn:hover { opacity: 0.85; }

/* FEEDBACK */
.feedback-bar {
  border-radius: 14px; padding: 14px 18px; margin-bottom: 16px;
  font-weight: 700; display: none; align-items: center; gap: 10px;
}
.feedback-bar.show { display: flex; }
.feedback-bar.ok { background: rgba(52,212,122,0.15); color: var(--green); border: 1.5px solid var(--green); }
.feedback-bar.ko { background: rgba(255,75,110,0.15); color: var(--accent); border: 1.5px solid var(--accent); }

/* BOTTOM BTN */
.bottom-btn {
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border: none; border-radius: var(--radius); padding: 18px;
  color: white; font-size: 1.1rem; font-weight: 800;
  cursor: pointer; width: 100%; margin-top: auto;
  transition: transform 0.1s, opacity 0.2s;
}
.bottom-btn:hover { opacity: 0.9; transform: scale(0.99); }
.bottom-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* RESULT SCREEN */
.result-body {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 32px 24px;
  text-align: center;
}
.result-emoji { font-size: 5rem; margin-bottom: 16px; animation: pop 0.4s ease; }
@keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.result-title { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
.result-sub { color: var(--muted); margin-bottom: 32px; font-size: 0.95rem; }
.result-stats { display: flex; gap: 20px; margin-bottom: 36px; }
.result-stat { background: var(--surface); border-radius: var(--radius); padding: 18px 24px; }
.result-stat .num { font-size: 2rem; font-weight: 900; }
.result-stat .label { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
.result-stat.green .num { color: var(--green); }
.result-stat.red .num { color: var(--accent); }
.result-stat.yellow .num { color: var(--yellow); }

/* NOTIFICATION */
.notif {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
  background: var(--green); color: #0f1117; border-radius: 20px;
  padding: 8px 20px; font-weight: 800; font-size: 0.9rem;
  opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 999;
}
.notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* MISC */
.speak-btn {
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 50%; width: 40px; height: 40px; color: var(--text);
  cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
}
.speak-btn:hover { border-color: var(--accent2); color: var(--accent2); }

.nav-tabs {
  display: flex; background: var(--surface);
  border-top: 1px solid var(--border);
  position: sticky; bottom: 0;
}
.nav-tab {
  flex: 1; padding: 12px; text-align: center; cursor: pointer;
  font-size: 0.7rem; font-weight: 700; color: var(--muted);
  border: none; background: none; display: flex; flex-direction: column;
  align-items: center; gap: 3px; transition: color 0.2s;
}
.nav-tab.active { color: var(--accent); }
.nav-tab span { font-size: 1.3rem; }

.mode-selector { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.mode-btn {
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 99px; padding: 8px 16px; color: var(--muted);
  cursor: pointer; font-size: 0.82rem; font-weight: 700;
  transition: all 0.2s;
}
.mode-btn.active { background: var(--accent2); border-color: var(--accent2); color: white; }

.hearts { display: flex; gap: 4px; }
.heart { font-size: 1.1rem; }

/* DICT screen */
.dict-search {
  width: 100%; background: var(--surface); border: 2px solid var(--border);
  border-radius: 14px; padding: 14px 18px; color: var(--text);
  font-size: 1rem; outline: none; font-family: 'Nunito', sans-serif;
  margin-bottom: 16px;
}
.dict-search:focus { border-color: var(--accent2); }
.dict-list { display: flex; flex-direction: column; gap: 8px; }
.dict-item {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.dict-item .dk { font-family: 'Noto Sans KR', sans-serif; font-size: 1.1rem; font-weight: 700; }
.dict-item .dr { font-size: 0.78rem; color: var(--accent2); }
.dict-item .df { font-size: 0.9rem; color: var(--muted); }
.dict-item .dtag {
  background: var(--surface2); border-radius: 8px;
  padding: 3px 8px; font-size: 0.7rem; color: var(--muted);
}

/* ── GRAMMAR SCREEN ── */
.grammar-tabs { display: flex; gap: 8px; padding: 14px 20px 0; overflow-x: auto; }
.grammar-tab {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: 20px; padding: 8px 16px; white-space: nowrap;
  color: var(--muted); cursor: pointer; font-size: 0.82rem; font-weight: 700;
  transition: all 0.2s;
}
.grammar-tab.active { background: var(--accent2); border-color: var(--accent2); color: white; }

.grammar-content { padding: 20px; flex: 1; overflow-y: auto; }

.grammar-rule {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 18px; margin-bottom: 16px;
}
.grammar-rule h3 {
  font-size: 1.2rem; font-weight: 900; color: var(--accent2); margin-bottom: 6px;
  font-family: 'Noto Sans KR', sans-serif;
}
.grammar-rule .rule-desc { color: var(--muted); font-size: 0.88rem; margin-bottom: 12px; line-height: 1.5; }
.formula-box {
  background: var(--surface2); border-left: 3px solid var(--accent2);
  border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; font-size: 0.9rem;
}
.formula-box .f-label { font-size: 0.72rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.formula-box .f-formula { font-weight: 800; color: var(--text); margin-bottom: 2px; }
.formula-box .f-example { color: var(--accent2); font-size: 0.85rem; }
.formula-box .f-trans { color: var(--muted); font-size: 0.8rem; }

.examples-list { display: flex; flex-direction: column; gap: 8px; }
.example-row {
  background: var(--surface2); border-radius: 10px; padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
}
.example-row .ex-kr { font-family: 'Noto Sans KR', sans-serif; font-size: 1rem; font-weight: 700; flex: 1; }
.example-row .ex-fr { font-size: 0.82rem; color: var(--muted); }
.example-row .speak-mini { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.95rem; }

/* GRAMMAR EXERCISES */
.gram-ex-card {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 18px; margin-bottom: 14px;
}
.gram-ex-card .ex-num { font-size: 0.72rem; font-weight: 800; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.gram-ex-card .ex-q { font-size: 1rem; font-weight: 700; margin-bottom: 14px; line-height: 1.5; }
.gram-ex-card .ex-q .blank {
  display: inline-block; min-width: 80px; border-bottom: 2px solid var(--accent2);
  text-align: center; color: var(--accent2); font-weight: 800;
}

/* Word-order drag game */
.word-bank { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; min-height: 44px; }
.word-chip {
  background: var(--surface2); border: 2px solid var(--border);
  border-radius: 10px; padding: 8px 14px; cursor: pointer;
  font-size: 0.95rem; font-weight: 700; transition: all 0.15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.word-chip:hover { border-color: var(--accent2); color: var(--accent2); }
.word-chip.used { opacity: 0.3; pointer-events: none; }
.answer-zone {
  min-height: 52px; background: var(--surface2); border: 2px dashed var(--border);
  border-radius: 12px; padding: 10px; display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 12px;
}
.answer-zone .word-chip { background: var(--accent2); border-color: var(--accent2); color: white; }
.answer-zone.correct { border-color: var(--green); border-style: solid; }
.answer-zone.wrong { border-color: var(--accent); border-style: solid; }

/* Reading comprehension */
.reading-text {
  background: var(--surface2); border-radius: 12px; padding: 16px;
  font-size: 0.95rem; line-height: 1.8; margin-bottom: 16px;
  font-family: 'Noto Sans KR', sans-serif; border-left: 3px solid var(--accent2);
}
.reading-q { font-weight: 700; margin-bottom: 10px; }
.reading-opts { display: flex; flex-direction: column; gap: 8px; }
</style>
</head>
<body>

<!-- NOTIFICATION -->
<div class="notif" id="notif"></div>

<!-- ══════════════ HOME ══════════════ -->
<div class="screen active" id="screen-home">
  <div class="topbar">
    <div class="logo">한<span>국</span>어</div>
    <div class="topbar-stats">
      <div class="stat-pill">🔥 <span id="streak">0</span></div>
      <div class="stat-pill">⭐ <span id="xp-display">0</span> XP</div>
    </div>
  </div>
  <div class="home-content">
    <div class="welcome">
      <h1>Apprends le<br><em>coréen</em> 🇰🇷</h1>
      <p>Choisis une leçon pour commencer !</p>
    </div>

    <div class="progress-card">
      <h3>Progression totale</h3>
      <div class="xp-num">⭐ <span id="xp-big">0</span> XP</div>
      <div class="xp-bar-wrap">
        <div class="xp-bar" id="xp-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="section-label">Leçons</div>
    <div class="lessons-grid" id="lessons-grid"></div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('home')"><span>🏠</span>Accueil</button>
    <button class="nav-tab" onclick="showTab('grammar')"><span>📝</span>Phrases</button>
    <button class="nav-tab" onclick="showTab('dict')"><span>📖</span>Dico</button>
  </div>
</div>

<!-- ══════════════ LESSON ══════════════ -->
<div class="screen" id="screen-lesson">
  <div class="lesson-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div id="lesson-icon-title" style="font-size:1.3rem"></div>
    <div class="lesson-title" id="lesson-title-text"></div>
    <div class="hearts" id="hearts-display"></div>
    <div style="width:100px">
      <div class="lesson-progress-bar">
        <div class="lesson-progress-fill" id="lesson-prog-fill" style="width:0%"></div>
      </div>
    </div>
  </div>
  <div class="lesson-body" id="lesson-body"></div>
</div>

<!-- ══════════════ RESULT ══════════════ -->
<div class="screen" id="screen-result">
  <div class="result-body">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title">Bravo !</div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-stats">
      <div class="result-stat green">
        <div class="num" id="res-correct">0</div>
        <div class="label">Corrects</div>
      </div>
      <div class="result-stat red">
        <div class="num" id="res-wrong">0</div>
        <div class="label">Erreurs</div>
      </div>
      <div class="result-stat yellow">
        <div class="num" id="res-xp">0</div>
        <div class="label">XP gagnés</div>
      </div>
    </div>
    <button class="bottom-btn" onclick="goHome()" style="max-width:320px">Retour à l'accueil</button>
    <button class="bottom-btn" id="retry-btn" onclick="retryLesson()" style="max-width:320px;margin-top:10px;background:var(--surface);color:var(--text);border:2px solid var(--border);">Réessayer</button>
  </div>
</div>

<!-- ══════════════ DICT ══════════════ -->
<div class="screen" id="screen-dict">
  <div class="topbar">
    <div class="logo">한<span>국</span>어</div>
    <div class="topbar-stats">
      <div class="stat-pill">🔥 <span id="streak2">0</span></div>
      <div class="stat-pill">⭐ <span id="xp-display2">0</span> XP</div>
    </div>
  </div>
  <div style="padding:20px;flex:1;overflow-y:auto">
    <div class="section-label" style="margin-bottom:12px">Dictionnaire</div>
    <input class="dict-search" placeholder="Chercher un mot..." id="dict-input" oninput="filterDict()">
    <div class="dict-list" id="dict-list"></div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab" onclick="showTab('home')"><span>🏠</span>Accueil</button>
    <button class="nav-tab" onclick="showTab('grammar')"><span>📝</span>Phrases</button>
    <button class="nav-tab active" onclick="showTab('dict')"><span>📖</span>Dico</button>
  </div>
</div>

<!-- ══════════════ GRAMMAR ══════════════ -->
<div class="screen" id="screen-grammar">
  <div class="topbar">
    <div class="logo">한<span>국</span>어</div>
    <div class="topbar-stats">
      <div class="stat-pill">🔥 <span id="streak3">0</span></div>
      <div class="stat-pill">⭐ <span id="xp-display3">0</span> XP</div>
    </div>
  </div>
  <div class="grammar-tabs" id="grammar-tabs">
    <button class="grammar-tab active" onclick="showGrammarTab(0)">-(으)ㄹ래요</button>
    <button class="grammar-tab" onclick="showGrammarTab(1)">-고 싶다</button>
    <button class="grammar-tab" onclick="showGrammarTab(2)">-어/아 주세요</button>
    <button class="grammar-tab" onclick="showGrammarTab(3)">☕ Café</button>
    <button class="grammar-tab" onclick="showGrammarTab(4)">✏️ Exercices</button>
    <button class="grammar-tab" onclick="showGrammarTab(5)">📖 Lecture</button>

    grid.appendChild(card);

// ══════════════════════════════════════
// LESSON
// ══════════════════════════════════════
function startLesson(lesson) {
  currentLesson = lesson;
  hearts = 3;
  correctCount = 0;
  wrongCount = 0;
  xpGained = 0;
  isAnswered = false;
  // Build a queue: mix of exercise types
  const shuffled = shuffle([...lesson.words]);
  queue = [];
  shuffled.forEach(w => {
    const types = ['flashcard', 'qcm-kr-fr', 'qcm-fr-kr'];
    const t = types[Math.floor(Math.random() * types.length)];
    queue.push({ word: w, type: t });
  });
  qIdx = 0;
  showScreen('lesson');
  document.getElementById('lesson-icon-title').textContent = lesson.icon;
  document.getElementById('lesson-title-text').textContent = lesson.name;
  renderHearts();
  renderExercise();
}

function retryLesson() { if (currentLesson) startLesson(currentLesson); }

function renderHearts() {
  const h = document.getElementById('hearts-display');
  h.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const s = document.createElement('span');
    s.className = 'heart';
    s.textContent = i < hearts ? '❤️' : '🖤';
    h.appendChild(s);
  }
}

function updateProgress() {
  const pct = Math.round((qIdx / queue.length) * 100);
  document.getElementById('lesson-prog-fill').style.width = pct + '%';
}

function renderExercise() {
  updateProgress();
  if (qIdx >= queue.length) { endLesson(); return; }
  const item = queue[qIdx];
  currentCard = item.word;
  isAnswered = false;
  const body = document.getElementById('lesson-body');
  if (item.type === 'flashcard') renderFlashcard(body, item.word);
  else if (item.type === 'qcm-kr-fr') renderQCM(body, item.word, 'kr-fr');
  else if (item.type === 'qcm-fr-kr') renderQCM(body, item.word, 'fr-kr');
}

function renderFlashcard(body, word) {
  body.innerHTML = `
    <div class="exercise-type">Flashcard</div>
    <div class="exercise-prompt">Retourne la carte !</div>
    <div class="exercise-sub">Tap pour voir la traduction</div>
    <div class="flashcard-wrap">
      <div class="flashcard" id="fc" onclick="flipCard()">
        <div class="card-face">
          <div class="card-korean">${word.k}</div>
          <div class="card-roman">${word.r}</div>
          <div class="card-hint">👆 Tape pour retourner</div>
        </div>
        <div class="card-face card-back">
          <div class="card-french">${word.f}</div>
          <div class="card-roman">${word.r}</div>
          <div class="card-hint">C'est mémorisé ?</div>
        </div>
      </div>
    </div>
    <div class="feedback-bar" id="fb"></div>
    <button class="bottom-btn" id="main-btn" onclick="nextExercise()" style="opacity:0.4;pointer-events:none">Continuer →</button>
  `;
}

function flipCard() {
  const fc = document.getElementById('fc');
  fc.classList.toggle('flipped');
  const btn = document.getElementById('main-btn');
  if (fc.classList.contains('flipped')) {
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  }
  speak(currentCard.k);
}

function renderQCM(body, word, dir) {
  const isKrFr = dir === 'kr-fr';
  const question = isKrFr ? word.k : word.f;
  const correctAns = isKrFr ? word.f : word.k;
  // Build 3 wrong answers from other words in lesson
  const pool = currentLesson.words.filter(w => w.k !== word.k);
  const wrongs = shuffle(pool).slice(0, 3).map(w => isKrFr ? w.f : w.k);
  const opts = shuffle([correctAns, ...wrongs]);
  const correctIdx = opts.indexOf(correctAns);

  body.innerHTML = `
    <div class="exercise-type">${isKrFr ? 'Coréen → Français' : 'Français → Coréen'}</div>
    <div class="exercise-prompt">${isKrFr ? `<span style="font-family:'Noto Sans KR',sans-serif;font-size:2rem">${question}</span>` : question}</div>
    <div class="exercise-sub">${isKrFr ? word.r : 'Trouve la traduction en coréen'}</div>
    <button class="speak-btn" onclick="speak('${word.k}')">🔊</button>
    <div class="options-grid">
      ${opts.map((o, i) => `<button class="opt" id="opt-${i}" onclick="selectOpt(${i}, ${correctIdx})">${o}</button>`).join('')}
    </div>
    <div class="feedback-bar" id="fb"></div>
    <button class="bottom-btn" id="main-btn" disabled onclick="nextExercise()">Vérifier</button>
  `;
}

function selectOpt(chosen, correct) {
  if (isAnswered) return;
  isAnswered = true;
  const fb = document.getElementById('fb');
  const btn = document.getElementById('main-btn');
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  btn.disabled = false;
  btn.textContent = 'Continuer →';
  if (chosen === correct) {
    document.getElementById(`opt-${chosen}`).classList.add('correct');
    fb.innerHTML = '✅ 맞아요! Correct !';
    fb.className = 'feedback-bar ok show';
    correctCount++;
    xpGained += 10;
    xp += 10;
    showNotif('+10 XP ⭐');
  } else {
    document.getElementById(`opt-${chosen}`).classList.add('wrong');
    document.getElementById(`opt-${correct}`).classList.add('reveal');
    fb.innerHTML = `❌ 틀렸어요 — La bonne réponse : <strong>${document.getElementById(`opt-${correct}`).textContent}</strong>`;
    fb.className = 'feedback-bar ko show';
    wrongCount++;
    hearts = Math.max(0, hearts - 1);
    renderHearts();
    if (hearts === 0) { setTimeout(endLesson, 1200); return; }
  }
  speak(currentCard.k);
}

function nextExercise() {
  qIdx++;
  renderExercise();
}

function endLesson() {
  const pct = Math.round((correctCount / (correctCount + wrongCount || 1)) * 100);
  lessonProgress[currentLesson.id] = Math.max(lessonProgress[currentLesson.id] || 0, pct);
  if (correctCount > 0) streak = Math.max(streak, 1);
  saveState();
  showScreen('result');
  document.getElementById('res-correct').textContent = correctCount;
  document.getElementById('res-wrong').textContent = wrongCount;
  document.getElementById('res-xp').textContent = xpGained;
  if (hearts === 0) {
    document.getElementById('result-emoji').textContent = '💔';
    document.getElementById('result-title').textContent = 'Plus de vies !';
    document.getElementById('result-sub').textContent = 'Réessaie pour t\'améliorer !';
  } else if (pct >= 90) {
    document.getElementById('result-emoji').textContent = '🏆';
    document.getElementById('result-title').textContent = 'Parfait !';
    document.getElementById('result-sub').textContent = 'Tu maîtrises cette leçon !';
  } else if (pct >= 60) {
    document.getElementById('result-emoji').textContent = '🎉';
    document.getElementById('result-title').textContent = 'Bravo !';
    document.getElementById('result-sub').textContent = 'Continue comme ça !';
  } else {
    document.getElementById('result-emoji').textContent = '💪';
    document.getElementById('result-title').textContent = 'Continue !';
    document.getElementById('result-sub').textContent = 'Un peu de pratique et tu y seras !';
  }
}

// DICTIONARY
// ══════════════════════════════════════
const allWords = [];
lessons.forEach(l => l.words.forEach(w => allWords.push({ ...w, cat: l.name, icon: l.icon })));

function renderDict(filter = '') {
  const list = document.getElementById('dict-list');
  const f = filter.toLowerCase();
  const filtered = allWords.filter(w =>
    w.k.includes(f) || w.r.toLowerCase().includes(f) || w.f.toLowerCase().includes(f) || w.cat.toLowerCase().includes(f)
  );
  list.innerHTML = filtered.slice(0, 80).map(w => `
    <div class="dict-item">
      <div>
        <div class="dk">${w.k} <span style="font-size:0.8rem;color:var(--accent2)">${w.r}</span></div>
        <div class="df">${w.f}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="dtag">${w.icon} ${w.cat}</div>
        <button onclick="speak('${w.k}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem">🔊</button>
      </div>
    </div>
  `).join('');
}

function filterDict() {
  renderDict(document.getElementById('dict-input').value);
}

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR'; u.rate = 0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 1800);
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  renderHome();
}

function goHome() {
  showScreen('home');
  saveState();
}

function showTab(tab) {
  if (tab === 'home') { showScreen('home'); }
  else if (tab === 'dict') { showScreen('dict'); renderDict(); }
  else if (tab === 'grammar') { showScreen('grammar'); showGrammarTab(0); }
}

function addWordToAnswer(exIdx, word, chipIdx, total) {
  if (!window._wordAnswers) window._wordAnswers = Array(total).fill(null).map(()=>[]);
  const az = document.getElementById(`az-${exIdx}`);
  az.querySelector('span') && az.querySelector('span').remove();
  const chip = document.getElementById(`wc-${exIdx}-${chipIdx}`);
  window._wordAnswers[exIdx].push({ word, chipIdx });
  chip.classList.add('used');
  const token = document.createElement('div');
  token.className = 'word-chip';
  token.textContent = word;
  token.style.cursor = 'pointer';
  const snapChipIdx = chipIdx;
  const snapWord = word;
  token.onclick = () => {
    chip.classList.remove('used');
    const arr = window._wordAnswers[exIdx];
    const idx = arr.findIndex(x => x.chipIdx === snapChipIdx && x.word === snapWord);
    if (idx !== -1) arr.splice(idx, 1);
    token.remove();
    if (az.children.length === 0) az.innerHTML = '<span style="color:var(--border);font-size:0.8rem;align-self:center;margin:auto">Clique sur les mots ci-dessous</span>';
  };
  az.appendChild(token);
}

function clearAnswer(exIdx) {
  const az = document.getElementById(`az-${exIdx}`);
  az.innerHTML = '<span style="color:var(--border);font-size:0.8rem;align-self:center;margin:auto">Clique sur les mots ci-dessous</span>';
  az.className = 'answer-zone';
  document.querySelectorAll(`#wb-${exIdx} .word-chip`).forEach(c => c.classList.remove('used'));
  if (window._wordAnswers) window._wordAnswers[exIdx] = [];
  const fb = document.getElementById(`fb-w-${exIdx}`);
  if (fb) { fb.className = 'feedback-bar'; fb.textContent = ''; }
}

function checkWordOrder(exIdx, correctAnswer, total) {
  const az = document.getElementById(`az-${exIdx}`);
  const chips = Array.from(az.querySelectorAll('.word-chip'));
  const answer = chips.map(c=>c.textContent).join(' ');
  const fb = document.getElementById(`fb-w-${exIdx}`);
  if (answer.trim() === correctAnswer.trim()) {
    az.className = 'answer-zone correct';
    const ex = (window._pickedOrder || wordOrderExs)[exIdx];
    fb.innerHTML = `✅ 맞아요! <span style="color:var(--muted)">${ex ? ex.trans : ''}</span>`;
    fb.className = 'feedback-bar ok show';
    xp += 15; speak(correctAnswer);
    document.querySelectorAll(`#wex-${exIdx} button`).forEach(b => b.disabled = true);
    showNotif('+15 XP ⭐'); saveState();
  } else {
    az.className = 'answer-zone wrong';
    fb.innerHTML = `❌ Réponse : <span style="font-family:'Noto Sans KR',sans-serif;color:var(--green)">${correctAnswer}</span>`;
    fb.className = 'feedback-bar ko show';
  }
}
